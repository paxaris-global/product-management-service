spring.application.name=project-management-service
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.level=%5p [traceId=%X{traceId:-},spanId=%X{spanId:-},correlationId=%X{correlationId:-}]

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.endpoints.web.exposure.include=health,info

server.port=8088

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=-1

# GitHub Provisioning Configuration
github.token=${GITHUB_TOKEN}
github.org=${GITHUB_ORG:}
github.api.base-url=${GITHUB_API_BASE_URL:https://api.github.com}
provisioning.default-admin-username=${PROVISIONING_DEFAULT_ADMIN_USERNAME:admin}

# Docker Hub credentials (used for injecting GitHub Actions secrets into generated repos)
docker.hub.username=${DOCKER_USERNAME:}
docker.hub.token=${DOCKER_PASSWORD:}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.info.title=Product Management Service API
springdoc.info.version=1.0.0
springdoc.info.description=APIs for role URL mapping and GitHub repository provisioning

